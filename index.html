<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DashTrack Ultra | Live Asset</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --surface: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #22c55e;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; background: var(--surface);
            color: var(--text); height: 100dvh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        #map { flex: 1; width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        .ui-overlay {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 16px;
        }

        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            pointer-events: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .top-bar { align-self: center; padding: 10px 20px; display: flex; align-items: center; gap: 12px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); transition: 0.3s; }
        .dot.active { background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .dash-card { width: 100%; max-width: 440px; margin: 0 auto; padding: 24px; }
        .header-row { display: flex; justify-content: space-between; margin-bottom: 20px; }
        
        .progress-bar { height: 6px; background: #334155; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        #fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), #818cf8); transition: 0.8s ease; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { 
            flex: 1; padding: 14px; border-radius: 14px; border: none; font-weight: 700; 
            cursor: pointer; transition: 0.2s; font-size: 0.85rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }

        #chat-ui {
            position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 420px; height: 60dvh; z-index: 2000;
            display: flex; flex-direction: column; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #chat-ui.show { bottom: 20px; }
        .chat-msgs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 0.9rem; max-width: 80%; }
        .bubble.dr { background: #334155; align-self: flex-start; border-bottom-left-radius: 4px; }
        .bubble.us { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="ui-overlay">
    <div class="top-bar glass">
        <div id="status-dot" class="dot"></div>
        <span style="font-size: 0.75rem; font-weight: 800; letter-spacing: 1px;" id="status-msg">SYSTEM OFFLINE</span>
    </div>

    <div class="dash-card glass">
        <div class="header-row">
            <div>
                <div style="color: #94a3b8; font-size: 0.7rem; font-weight: 700;">DESTINATION</div>
                <div id="eta-val" style="font-size: 1.4rem; font-weight: 800;">Waiting...</div>
            </div>
            <div style="text-align: right;">
                <div style="color: var(--accent); font-weight: 800; font-size: 1.2rem;">$42.50</div>
                <div style="color: #94a3b8; font-size: 0.6rem;">ORDER #8842</div>
            </div>
        </div>

        <div class="progress-bar"><div id="fill"></div></div>

        <div id="setup-controls" class="btn-group">
            <button class="btn btn-primary" onclick="initNode('driver')">START AS DRIVER</button>
            <button class="btn btn-secondary" onclick="initNode('customer')">VIEW AS CUSTOMER</button>
        </div>
        
        <div id="active-controls" class="btn-group" style="display:none;">
            <button class="btn btn-secondary" onclick="toggleChat()">💬 CHAT</button>
            <button class="btn btn-primary" onclick="location.reload()">⏹ STOP</button>
        </div>
    </div>
</div>

<div id="chat-ui" class="glass">
    <div style="padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between;">
        <b>Live Support</b>
        <span onclick="toggleChat()" style="cursor:pointer; opacity: 0.5;">✕</span>
    </div>
    <div class="chat-msgs" id="msgs"></div>
    <div style="padding: 15px; display: flex; gap: 10px;">
        <input type="text" id="chat-in" placeholder="Message..." style="flex:1; background:#0f172a; border:1px solid #334155; border-radius:10px; color:white; padding:10px;">
        <button onclick="send()" style="background:var(--primary); color:white; border:none; padding:10px 15px; border-radius:10px;">Send</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- API KEY INTEGRATED ---
    const ABLY_KEY = 'aKWa1Q.6ha3FQ:-ySxvWbeaFxTcHM85kCUafh7omHSUQApeDxVsHJpofU'; 
    const DESTINATION = [40.7589, -73.9851]; 
    
    const ably = new Ably.Realtime(ABLY_KEY);
    const channel = ably.channels.get('delivery-live');
    
    const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(DESTINATION, 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    const driverMarker = L.marker([0,0], { icon: L.divIcon({ html: '🛵', className: 'm-icon', iconSize: [30,30] })}).addTo(map);
    L.marker(DESTINATION, { icon: L.divIcon({ html: '🏠', className: 'm-icon', iconSize: [30,30] })}).addTo(map);

    function toggleChat() { document.getElementById('chat-ui').classList.toggle('show'); }

    function initNode(role) {
        document.getElementById('setup-controls').style.display = 'none';
        document.getElementById('active-controls').style.display = 'flex';
        document.getElementById('status-dot').classList.add('active');
        
        if (role === 'driver') {
            document.getElementById('status-msg').innerText = "TRANSMITTING LIVE GPS";
            navigator.geolocation.watchPosition(pos => {
                const data = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                driverMarker.setLatLng([data.lat, data.lng]);
                map.panTo([data.lat, data.lng]);
                channel.publish('gps', data);
                updateUI(data.lat, data.lng);
            }, null, { enableHighAccuracy: true });
        } else {
            document.getElementById('status-msg').innerText = "RECEIVING LIVE STREAM";
            channel.subscribe('gps', msg => {
                driverMarker.setLatLng([msg.data.lat, msg.data.lng]);
                map.panTo([msg.data.lat, msg.data.lng]);
                updateUI(msg.data.lat, msg.data.lng);
            });
        }
    }

    function updateUI(lat, lng) {
        const d = getDist(lat, lng, DESTINATION[0], DESTINATION[1]);
        document.getElementById('eta-val').innerText = d < 0.05 ? "ARRIVED" : Math.round(d * 4) + " MINS";
        document.getElementById('fill').style.width = Math.min(100, (1 - d/3) * 100) + "%";
    }

    function getDist(l1, n1, l2, n2) {
        const R = 6371;
        const dLat = (l2-l1)*Math.PI/180;
        const dLon = (n2-n1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function send() {
        const inp = document.getElementById('chat-in');
        if (!inp.value) return;
        const b = document.createElement('div');
        b.className = "bubble us";
        b.innerText = inp.value;
        document.getElementById('msgs').appendChild(b);
        inp.value = "";
    }
</script>
</body>
</html>
